{% extends 'base.html' %}
{% block title %}编辑笔记{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="mb-4">编辑笔记</h2>
            <form method="POST" id="noteForm">
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input type="text" name="title" id="titleInput" value="{{ note.title }}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">标签</label>
                    <div class="input-group">
                        <input type="text" name="tags" id="tagsInput" value="{{ note.tags | map(attribute='name') | join(',') }}" class="form-control" placeholder="用逗号分隔，如：操作系统,虚拟存储器">
                        <button type="button" class="btn btn-outline-primary" id="btnRecommendTags">
                            <span id="btnRecommendIcon">AI 推荐</span>
                            <span id="btnRecommendLoading" class="d-none">
                                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                                生成中...
                            </span>
                        </button>
                    </div>
                    <div id="recommendedTags" class="mt-2 d-none">
                        <small class="text-muted">AI 推荐标签：</small>
                        <div id="tagList" class="d-inline"></div>
                    </div>
                    <div id="tagError" class="text-danger small mt-1 d-none"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">内容</label>
                    <textarea id="editor" name="content">{{ note.content }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">文件夹（可选）</label>
                    <select name="folder_id" class="form-select">
                        <option value="">不放入文件夹</option>
                        {% for folder in folders %}
                        <option value="{{ folder.id }}" {% if note.folder_id == folder.id %}selected{% endif %}>
                            {{ folder.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="/notes/{{ note.id }}" class="btn-link-apple">取消</a>
                    <span id="saveHint" class="text-muted small d-none">
                        <span class="spinner-border spinner-border-sm" role="status"></span>
                        AI 正在推荐标签...
                    </span>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    const easyMDE = new EasyMDE({
        element: document.getElementById('editor'),
        spellChecker: false,
        placeholder: '用Markdown写笔记...',
    });
    
    // AI标签推荐功能
    document.getElementById('btnRecommendTags').addEventListener('click', async function() {
        const title = document.getElementById('titleInput').value.trim();
        const content = easyMDE.value().trim();
        
        if (!content) {
            showError('请先填写笔记内容');
            return;
        }
        
        const btn = this;
        const saveHint = document.getElementById('saveHint');
        const tagError = document.getElementById('tagError');
        const recommendedTags = document.getElementById('recommendedTags');
        const btnIcon = document.getElementById('btnRecommendIcon');
        const btnLoading = document.getElementById('btnRecommendLoading');
        
        btn.disabled = true;
        btnIcon.classList.add('d-none');
        btnLoading.classList.remove('d-none');
        saveHint.classList.remove('d-none');
        tagError.classList.add('d-none');

        // 在推荐区显示占位提示
        const tagList = document.getElementById('tagList');
        tagList.innerHTML = '<span class="text-muted small"><span class="spinner-border spinner-border-sm" role="status"></span> AI 正在分析笔记内容...</span>';
        recommendedTags.classList.remove('d-none');
        
        try {
            const response = await fetch('/api/ai-recommend-tags', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, content: content })
            });
            const data = await response.json();
            
            if (data.success && data.tags.length > 0) {
                displayRecommendedTags(data.tags);
            } else {
                recommendedTags.classList.add('d-none');
                showError(data.error || '未能生成推荐标签');
            }
        } catch (error) {
            recommendedTags.classList.add('d-none');
            showError('网络错误，请稍后重试');
        } finally {
            btn.disabled = false;
            btnIcon.classList.remove('d-none');
            btnLoading.classList.add('d-none');
            saveHint.classList.add('d-none');
        }
    });
    
    function displayRecommendedTags(tags) {
        const tagList = document.getElementById('tagList');
        const recommendedTags = document.getElementById('recommendedTags');
        const tagsInput = document.getElementById('tagsInput');
        
        tagList.innerHTML = '';
        tags.forEach(function(tag) {
            const badge = document.createElement('a');
            badge.href = '#';
            badge.className = 'tag-badge tag-color-' + (tag.length % 8) + ' me-1';
            badge.textContent = tag;
            badge.onclick = function(e) {
                e.preventDefault();
                // 添加标签到输入框
                let currentTags = tagsInput.value.trim();
                if (currentTags) {
                    // 检查是否已存在
                    const existingTags = currentTags.split(',').map(t => t.trim().toLowerCase());
                    if (!existingTags.includes(tag.toLowerCase())) {
                        tagsInput.value = currentTags + ', ' + tag;
                    }
                } else {
                    tagsInput.value = tag;
                }
            };
            tagList.appendChild(badge);
        });
        
        recommendedTags.classList.remove('d-none');
    }
    
    function showError(message) {
        const tagError = document.getElementById('tagError');
        tagError.textContent = message;
        tagError.classList.remove('d-none');
    }
</script>
{% endblock %}
