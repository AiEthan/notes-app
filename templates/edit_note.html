{% extends 'base.html' %}
{% block title %}编辑笔记{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h4 class="mb-4">编辑笔记</h4>
            <form method="POST" id="noteForm">
                <div class="mb-3">
                    <label class="form-label">标题</label>
                    <input type="text" name="title" value="{{ note.title }}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">标签</label>
                    <input type="text" name="tags" value="{{ note.tags | map(attribute='name') | join(',') }}" class="form-control" placeholder="用逗号分隔，如：操作系统,虚拟存储器" maxlength="500">
                </div>
                <div class="mb-3">
                    <label class="form-label">内容</label>
                    <textarea id="editor" name="content">{{ note.content }}</textarea>
                </div>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">保存修改</button>
                    <a href="/notes/{{ note.id }}" class="btn btn-outline-secondary">取消</a>
                </div>
                <div class="mb-3">
                    <label class="form-label">文件夹（可选）</label>
                    <select name="folder_id" class="form-select">
                        <option value="">不放入文件夹</option>
                        {% for folder in folders %}
                        <option value="{{ folder.id }}" {% if note.folder_id == folder.id %}selected{% endif %}>
                            📁 {{ folder.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    const easyMDE = new EasyMDE({
        element: document.getElementById('editor'),
        spellChecker: false,
        placeholder: '用Markdown写笔记...',
    });
</script>
{% endblock %}
